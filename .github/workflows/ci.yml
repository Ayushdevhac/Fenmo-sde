name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: expense-tracker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: expense-tracker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify app
        run: npm run verify
